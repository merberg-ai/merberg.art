server {
    listen 80;
    listen [::]:80;
    server_name merberg.art www.merberg.art;

    root /home/jim/www/merberg.art;
    index index.php index.html;

    access_log /var/log/nginx/merberg.art.access.log;
    error_log  /var/log/nginx/merberg.art.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    # Do not expose application internals directly.
    location ~ ^/(app|config|content|templates|partials|deploy|docs)/ {
        deny all;
    }

    # Block dotfiles except Let's Encrypt webroot challenges.
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Static asset caching.
    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
